function dStr(y,m,d){return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");}
function pd(s){return new Date(s+"T00:00:00");}
function inR(s,a,b){return pd(s)>=pd(a)&&pd(s)<=pd(b);}
function getStatus(store,ds){
  const dow=pd(ds).getDay();
  if(dow===0)return"closed";
  for(const [a,b] of store.special)if(inR(ds,a,b))return"special";
  if(store.openHolidays&&store.openHolidays.includes(ds)){
    for(const [a,b] of store.vac)if(inR(ds,a,b))return"vacation";
    for(const [a,b] of store.sem)if(inR(ds,a,b))return dow===6?"open_sat":"open";
    return"vacation";
  }
  if(HOL.includes(ds))return"holiday";
  for(const [a,b] of store.vac)if(inR(ds,a,b))return"vacation";
  for(const [a,b] of store.sem)if(inR(ds,a,b))return dow===6?"open_sat":"open";
  return"vacation";
}

  if(tab==="menu"){html+=`<div style="padding:14px 14px 0"><div style="background:linear-gradient(135deg,${c},${c}cc);border-radius:18px;overflow:hidden;margin-bottom:14px"><div style="padding:16px 18px 10px;display:flex;justify-content:space-between;align-items:flex-start"><div><div style="color:rgba(255,255,255,0.6);font-size:9px;letter-spacing:0.14em;font-weight:700">WEEKLY SPECIAL</div><div style="color:#fff;font-size:16px;font-weight:900;margin-top:2px">今週のメニュー</div></div><div style="text-align:right"><div style="color:rgba(255,255,255,0.8);font-size:10px">${WEEKLY.period}</div><div style="color:rgba(255,255,255,0.45);font-size:9px">${WEEKLY.periodEn}</div></div></div><div style="padding:0 14px 16px;display:flex;flex-direction:column;gap:8px">${WEEKLY.items.map(item=>`<div style="background:rgba(255,255,255,0.13);border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:12px"><span style="font-size:24px">${item.emoji}</span><div style="flex:1"><div style="color:#fff;font-size:14px;font-weight:700">${item.ja}</div><div style="color:rgba(255,255,255,0.5);font-size:9px;margin-top:1px">${item.en}</div><div style="color:rgba(255,255,255,0.9);font-size:12px;margin-top:3px">${item.detail}</div><div style="color:rgba(255,255,255,0.45);font-size:10px">${item.detailEn}</div></div><div style="color:#fff;font-size:20px;font-weight:900;flex-shrink:0">¥${item.price}</div></div>`).join("")}</div></div><div style="font-size:11px;color:#999;font-weight:700;letter-spacing:0.1em;margin-bottom:8px">レギュラーメニュー <span style="font-weight:400;color:#ccc">Regular Menu</span></div><div style="background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.07);margin-bottom:12px">${regular.map((item,i)=>`<div style="display:flex;align-items:center;gap:12px;padding:13px 16px;${i<regular.length-1?'border-bottom:1px solid #f3f3f3':''}"><span style="font-size:20px;flex-shrink:0">${item.emoji}</span><div style="flex:1"><div style="font-size:14px;font-weight:600;color:#111">${item.ja}</div><div style="font-size:10px;color:#bbb;margin-top:1px">${item.en}</div></div><div style="font-size:17px;font-weight:800;color:${c};flex-shrink:0">¥${item.price}</div></div>`).join("")}</div>${sid==="rikkyo_niiza"?`<div style="margin-bottom:12px;padding:10px 14px;background:#f0f8f2;border-radius:10px;border-left:4px solid #2d6a3f;font-size:11px;color:#2d6a3f;line-height:1.7">💚 <b>健保メニュー</b>：健康保険組合対応の低カロリー・バランス食<br><span style="font-size:10px;color:#4a9060">Low-calorie balanced meal for health insurance members.</span></div>`:""}<div style="padding:12px 14px;background:#fff;border-radius:12px;border-left:4px solid #c8973a;font-size:11px;color:#888;line-height:1.8"><span style="color:#b8832a;font-weight:700">ℹ️ ご注意 / Notice</span><br>メニューは仕入れ状況により変更になる場合があります。<br><span style="font-size:10px;color:#bbb">Menu items may change due to availability.</span><br>アレルギーはスタッフまでお申し付けください。</div></div>`;}
  if(tab==="calendar"){
    const firstDow=new Date(calYear,calMonth,1).getDay(),daysInM=new Date(calYear,calMonth+1,0).getDate();
    const SI={open:{bg:null,mark:"●"},open_sat:{bg:null,mark:"●"},closed:{bg:"#e5e7eb",mark:"−"},vacation:{bg:"#dbeafe",mark:"休"},holiday:{bg:"#fee2e2",mark:"祝"},special:{bg:"#fef3c7",mark:"臨"}};
    let cells="";
    for(let i=0;i<firstDow;i++)cells+="<div></div>";
    for(let day=1;day<=daysInM;day++){
      const ds2=dStr(calYear,calMonth,day),st=getStatus(store,ds2),si=SI[st];
      const isOpen=st==="open"||st==="open_sat",isTd=ds2===todayDs,isSel=selDay===day,dow=pd(ds2).getDay();
      cells+=`<div onclick="selDay=${isSel?'null':day};render()" style="border-radius:10px;cursor:pointer;text-align:center;padding:6px 2px 5px;min-height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:${isSel?c:(isOpen?c+'1a':(si.bg||'#f3f4f6'))};border:${isTd?`2px solid ${c}`:'2px solid transparent'}"><div style="font-size:13px;font-weight:${isTd?800:500};color:${isSel?'#fff':(dow===0?'#e53e3e':dow===6?'#3182ce':isOpen?'#111':'#bbb')}">${day}</div><div style="font-size:8px;margin-top:1px;font-weight:600;color:${isSel?'rgba(255,255,255,0.8)':(isOpen?c:'#ccc')}">${isOpen?(st==="open_sat"?"土":"●"):si.mark}</div></div>`;
    }
    let sd="";
    if(selDay){
      const ds3=dStr(calYear,calMonth,selDay),st3=getStatus(store,ds3),isO=st3==="open"||st3==="open_sat",dow3=pd(ds3).getDay();
      const lbl={open:"✅ 営業日",open_sat:"✅ 営業日（土）",closed:"❌ 休業",vacation:"❌ 長期休業",holiday:"❌ 祝日休業",special:"❌ 臨時休業"};
      sd=`<div style="margin-top:12px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.1)"><div style="background:${isO?`linear-gradient(135deg,${c},${c}bb)`:"#9ca3af"};padding:14px 18px;color:#fff"><div style="font-size:12px;opacity:0.85">${calYear}年${MN[calMonth]}${selDay}日（${DW[dow3]}）</div><div style="font-size:18px;font-weight:800;margin-top:4px">${lbl[st3]||"❌ 休業"}</div></div>${isO?`<div style="padding:14px 18px"><div style="font-size:11px;color:#999;margin-bottom:8px;font-weight:600">今週の週替わりメニュー</div>${WEEKLY.items.map(item=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:18px">${item.emoji}</span><div style="flex:1"><div style="font-size:13px;font-weight:700;color:#111">${item.ja}</div><div style="font-size:11px;color:#888">${item.detail}</div></div><div style="font-size:15px;font-weight:800;color:${c}">¥${item.price}</div></div>`).join("")}</div>`:""}</div>`;
    }
    html+=`<div style="padding:14px 14px 0"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><button onclick="prevM()" style="background:none;border:none;font-size:24px;color:#555;padding:4px 12px">‹</button><span style="font-size:16px;font-weight:700;color:#111">${calYear}年 ${MN[calMonth]}</span><button onclick="nextM()" style="background:none;border:none;font-size:24px;color:#555;padding:4px 12px">›</button></div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px">${DW.map((d,i)=>`<div style="text-align:center;font-size:11px;font-weight:600;padding:3px 0;color:${i===0?'#e53e3e':i===6?'#3182ce':'#888'}">${d}</div>`).join("")}</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${cells}</div><div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;padding:10px 14px;background:#fff;border-radius:10px">${[{bg:c+"1a",l:"営業"},{bg:"#e5e7eb",l:"休業"},{bg:"#dbeafe",l:"長期休業"},{bg:"#fee2e2",l:"祝日休業"},{bg:"#fef3c7",l:"臨時休業"}].map(x=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:13px;height:13px;border-radius:3px;background:${x.bg};border:1px solid #e5e7eb"></div><span style="font-size:10px;color:#888">${x.l}</span></div>`).join("")}</div>${sd}</div>`;
  }
  document.getElementById("app").innerHTML=html;
}
function setSid(id){sid=id;selDay=null;render();}
function setTab(t){tab=t;selDay=null;render();}
function prevM(){if(calMonth===0){calYear--;calMonth=11;}else calMonth--;selDay=null;render();}
function nextM(){if(calMonth===11){calYear++;calMonth=0;}else calMonth++;selDay=null;render();}
render();
</script></body></html>
